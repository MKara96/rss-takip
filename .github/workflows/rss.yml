name: MKU RSS Guncelleme

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Güncel versiyon

      - name: Setup Python
        uses: actions/setup-python@v5 # Güncel versiyon
        with:
          python-version: '3.10'

      - name: Install dependencies
        # requirements.txt'ye gerek kalmadan her şeyi zorla ve eksiksiz kuruyoruz
        run: |
          pip install requests beautifulsoup4 feedgen pytz playwright Pillow
          playwright install chromium

      - name: Run scraper
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rss_files/
          git diff --quiet && git diff --staged --quiet || git commit -m "RSS ve resimler guncellendi"
          git push
