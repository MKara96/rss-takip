name: MKU RSS Guncelleme

on:
  schedule:
    - cron: '0 */4 * * *' # Her 4 saatte bir çalıştırır
  workflow_dispatch: # İlk deneme için manuel çalıştırma butonu

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rss_files/
          git diff --quiet && git diff --staged --quiet || git commit -m "RSS dosyaları güncellendi"
          git push
